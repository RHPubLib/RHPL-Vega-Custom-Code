function addClickListenerToImage() {
  let allBound = true;

  imageLinks.forEach(function({ src, url }) {
    const img = document.querySelector('img[src*="' + src + '"]:not([data-click-bound])');

    if (img) {
      img.setAttribute('data-click-bound', 'true');
      img.addEventListener('click', function() {
        setTimeout(function() {
          window.location.href = url;
        }, 100);
      });
      console.log('Listener bound for: ' + src);
    } else if (!document.querySelector('img[src*="' + src + '"]')) {
      // Image not in DOM yet
      allBound = false;
    }
  });

  if (allBound) {
    clearInterval(poller);
    observer.disconnect();
    console.log('All listeners bound');
  }
}

const poller = setInterval(addClickListenerToImage, 500);

const observer = new MutationObserver(function() {
  addClickListenerToImage();
});

document.addEventListener('DOMContentLoaded', function() {
  addClickListenerToImage();
  observer.observe(document.body, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ['src']
  });
});

<script>
function fixLinks(root) {
  root.querySelectorAll('a').forEach(function(link) {
    link.removeAttribute('target');
    link.addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = this.href;
    });
  });
}

const observer = new MutationObserver(function(mutations) {
  mutations.forEach(function(mutation) {
    mutation.addedNodes.forEach(function(node) {
      // Check the node itself
      if (node.nodeType === 1) {
        if (node.tagName === 'A') fixLinks(node.parentElement);
        fixLinks(node); // Check descendants too
      }
    });
  });
});

observer.observe(document.body, {
  childList: true,
  subtree: true      // ✅ Critical — watches ALL nested elements
});

// Also fix any links already on the page
fixLinks(document);
</script>
